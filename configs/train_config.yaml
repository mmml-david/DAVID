model:
  backbone_name: "Qwen/Qwen3-VL-8B-Instruct"
  backbone_dtype: "bfloat16"
  input_dim: 4096         # Qwen3-VL-2B pooler_output dim (= latent dim)
  n_encoder_layers: 4
  n_decoder_layers: 4
  n_heads: 16
  dropout: 0.1
  progressive_ratio: 0.0    # 0.0 = no mask, 0.5 = token N-1 sees ~N/2 random, 1.0 = sees ~1 random
  grad_checkpoint: true     # recompute activations on backward pass to reduce activation memory

training:
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  weight_decay: 0.01
  max_steps: 100000
  warmup_steps: 1000
  beta_target: 1.0e-4
  beta_warmup_steps: 10000
  m_ratio_start: 0.2        # m ~ Uniform(1, floor(N * ratio)); ratio ramps to 1.0
  m_ratio_warmup_start: 0 
  m_ratio_warmup_steps: 1000 
  grad_clip: 1.0
  ema_decay: 0.999

data:
  dataset_name: "chancharikm/QualityCheck"
  subset: "PerceptionTest"
  feature_cache_dir: "/data/user_data/hsuanhal/11777/DAVID/features_cache/perception_test"
  sample_fps: 1.0         # sample 1 frame per second; videos vary in length so token count varies per video
  max_frames: 64          # safety cap to avoid OOM on unusually long videos
  num_workers: 4

extraction:
  dataset_name: "chancharikm/QualityCheck"
  subset: "PerceptionTest"
  split: "validation"
  cache_dir: "/data/user_data/hsuanhal/11777/DAVID/features_cache/perception_test"
  sample_fps: 1.0         # sample 1 frame per second
  max_frames: 64          # safety cap
  model_name: "Qwen/Qwen3-VL-8B-Instruct"
  device: "cuda"
  max_samples: -1         # -1 = all samples
  num_shards: 8
  # shard_id: 0  # must be set explicitly when num_shards > 1

logging:
  use_wandb: true
  entity: "mmml-david"
  project: "DAVID"
  run_name: null  # set to a string to name the run, e.g. "baseline-lr1e4"; null = wandb auto-names it
  log_every: 50
  eval_every: 500
  save_every: 1000
  checkpoint_dir: "/data/user_data/hsuanhal/11777/DAVID/checkpoints"
